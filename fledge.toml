# fledge.toml — project task definitions
[tasks]
build = "cargo build --release"
test = "cargo test"
lint = "cargo clippy -- -D warnings"
fmt = "cargo fmt --check"
smoke = "./target/release/fledge-scratch --help >/dev/null"

[lanes.verify]
description = "Format, lint, test, build, and smoke-test the scratch plugin"
steps = ["fmt", "lint", "test", "build", "smoke"]
