[plugin]
name = "fledge-plugin-scratch"
version = "0.1.0"
description = "Throwaway scratch notes scoped to your current repo. Built in Rust."
author = "0xLeif"
license = "MIT"

[[commands]]
name = "scratch"
description = "Open a scratch markdown file scoped to the current repo"
binary = "target/release/fledge-scratch"

[capabilities]
exec = false
store = false
metadata = false
